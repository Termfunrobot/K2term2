<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การเรียนรู้แสนสนุก ระดับอนุบาล 2 เทอม 2 โดย สมาร์ทโรโบติกส์</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-yellow: #ffeb3b;
            --primary-orange: #ff9800;
            --soft-blue: #e3f2fd;
            --font-main: 'Mali', cursive;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--soft-blue);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(180deg, #ffeb3b, #fff176);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 8px dashed #ff9800;
            position: relative;
        }

        .header-main-title {
            color: #d32f2f;
            font-size: 1.8rem;
            margin: 0;
            text-shadow: 2px 2px white;
        }

        .header-sub-title {
            color: #1976d2;
            font-size: 1.2rem;
            margin: 5px 0 10px 0;
            font-weight: bold;
        }

        .score-display {
            background: #fff;
            padding: 10px 25px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            font-weight: bold;
            color: #ff9800;
            border: 3px solid #ff9800;
            font-size: 1.2rem;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; min-height: 600px; }

        .pagination {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            background: white;
            padding: 15px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .page-btn {
            background-color: #f5f5f5;
            border: 2px solid #ff9800;
            color: #ff9800;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            font-family: var(--font-main);
            transition: 0.2s;
        }

        .page-btn.active {
            background-color: #ff9800;
            color: white;
            box-shadow: 0 4px 0 #ef6c00;
        }

        .week-title-display {
            text-align: center;
            color: #2e7d32;
            font-size: 1.5rem;
            margin-bottom: 20px;
            background: #c8e6c9;
            padding: 10px;
            border-radius: 15px;
            display: block;
        }

        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .lesson-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border: 4px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }

        .lesson-card:hover { 
            transform: translateY(-5px);
            border-color: #ff9800;
        }

        .icon-box { font-size: 4.5rem; margin-bottom: 10px; display: block; }
        h3 { font-size: 1.3rem; color: #2c3e50; margin: 5px 0; }
        
        .btn-container { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }

        .btn-audio {
            background-color: #3498db; color: white; padding: 12px; border-radius: 25px;
            border: none; cursor: pointer; font-family: var(--font-main); font-size: 0.95rem;
            transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }

        .btn-audio:active { transform: scale(0.95); }

        .btn-play {
            background-color: #4caf50; color: white; padding: 12px; border-radius: 25px;
            border: none; font-weight: bold; cursor: pointer; font-family: var(--font-main); font-size: 0.95rem;
            transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }

        .btn-play.locked {
            background-color: #ccc;
            cursor: pointer;
            opacity: 0.7;
        }

        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.9);
            align-items: center; justify-content: center;
        }

        .modal-content {
            background: white; padding: 35px; border-radius: 40px;
            max-width: 500px; width: 90%; text-align: center; position: relative;
            border: 8px solid var(--primary-yellow);
        }

        .quiz-option {
            display: flex; align-items: center; justify-content: center;
            background: #fffde7; margin: 15px 0; padding: 18px;
            border-radius: 25px; border: 4px solid #fbc02d; cursor: pointer; 
            transition: 0.2s;
        }

        .quiz-option span.opt-icon { font-size: 4.5rem; }
        .quiz-option:hover { background: #fff9c4; border-color: #ff9800; }
        .quiz-option:active { transform: scale(0.9); }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #d32f2f; color: white; padding: 15px 30px; border-radius: 30px;
            display: none; z-index: 2000; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<header>
    <div class="header-main-title">🤖 การเรียนรู้แสนสนุกโดย สมาร์ทโรโบติกส์</div>

    <div class="lesson-grid" id="lessonGrid"></div>

<div id="quizModal" class="modal">

        <div id="quizOptions"></div>
    </div>
</div>

<div id="toast" class="toast">📢 กรุณากดฟังเรื่องราวก่อนนะจ๊ะ! 🔊</div>

                { icon: "🛰️", title: "สถานีอวกาศ", story: "สถานีอวกาศนานาชาติคือห้องแล็บขนาดยักษ์ที่ลอยอยู่นอกโลก ให้นักวิทยาศาสตร์ไปทำงาน", q: "ข้อไหนคือสถานีอวกาศ?", ans: "🛰️" },

                { icon: "🚀", title: "ยานสำรวจดาวอังคาร", story: "เราส่งหุ่นยนต์โรเวอร์ขึ้นยานอวกาศไปวิ่งสำรวจหาน้ำและสิ่งมีชีวิตบนดาวอังคาร", q: "ข้อไหนคือยานจรวด?", ans: "🚀" },
                { icon: "👽", title: "เอเลี่ยน", story: "ในจักรวาลอันกว้างใหญ่ อาจจะมีสิ่งมีชีวิตอื่นอาศัยอยู่ที่ดาวดวงอื่นก็เป็นได้นะ", q: "ข้อไหนคือเอเลี่ยน?", ans: "👽" },
                { icon: "🌍", title: "แรงโน้มถ่วงเป็นศูนย์", story: "เมื่ออยู่นอกโลกจะไม่มีแรงดึงดูด นักบินอวกาศจึงลอยตุ๊บป่องไปมาเหมือนปลาในน้ำ", q: "ข้อไหนคือโลกของเรา?", ans: "🌍" },
                { icon: "🔭", title: "หอดูดาว", story: "เราใช้กล้องโทรทรรศน์ยักษ์บนหอดูดาว เพื่อส่องดูเนบิวลาและกาแล็กซีที่อยู่ไกลแสนไกล", q: "ข้อไหนคือกล้องโทรทรรศน์?", ans: "🔭" }
            ]
        },
        {
            week: 16, theme: "พลเมืองดีของสังคม",
            items: [
                { icon: "🗳️", title: "การออกเสียงโหวต", story: "เมื่อเราต้องการเลือกหัวหน้าห้อง เราใช้วิธียกมือหรือหย่อนบัตรเลือกตั้งตามเสียงส่วนใหญ่", q: "ข้อไหนคือกล่องหย่อนบัตร?", ans: "🗳️" },
                { icon: "🚶", title: "การเข้าแถว", story: "เด็กดีต้องรู้จักรอคอยและเข้าแถวตามลำดับก่อนหลัง ไม่แซงคิวเพื่อนๆ นะจ๊ะ", q: "ข้อไหนคือการเดินต่อแถว?", ans: "🚶" },
                { icon: "🚦", title: "เคารพกฎจราจร", story: "เราต้องรอสัญญาณไฟเขียวคนข้าม และเดินข้ามตรงทางม้าลายหรือสะพานลอยเท่านั้น", q: "ข้อไหนคือไฟจราจร?", ans: "🚦" },
                { icon: "🗑️", title: "ทิ้งขยะให้ถูกที่", story: "การทิ้งขยะลงถังและรู้จักแยกขยะพลาสติก ช่วยให้ชุมชนของเราสะอาดและน่าอยู่", q: "ข้อไหนคือถังขยะ?", ans: "🗑️" },
                { icon: "🤝", title: "การแบ่งปัน", story: "การแบ่งขนมให้เพื่อนหรือบริจาคของเล่นให้เด็กด้อยโอกาส เป็นการส่งต่อความสุข", q: "ข้อไหนคือการจับมือช่วยเหลือ?", ans: "🤝" },
                { icon: "👵", title: "ช่วยเหลือผู้สูงอายุ", story: "เด็กน่ารักมีน้ำใจ คอยพยุงคุณตาคุณยายเดินข้ามถนน หรือลุกให้นั่งบนรถเมล์", q: "ข้อไหนคือคุณยาย?", ans: "👵" },
                { icon: "🙏", title: "การขอโทษ", story: "เมื่อเราเผลอทำผิดหรือวิ่งชนเพื่อน ต้องรีบยกมือไหว้แล้วกล่าวคำว่า 'ขอโทษครับ/ค่ะ' ทันที", q: "ข้อไหนคือการไหว้ขอโทษ?", ans: "🙏" },
                { icon: "🥰", title: "การขอบคุณ", story: "เมื่อผู้ใหญ่ให้ขนมหรือเพื่อนช่วยเหลือเรา ต้องไม่ลืมยิ้มและพูดว่า 'ขอบคุณครับ/ค่ะ' เสมอ", q: "ข้อไหนคือหน้ายิ้มขอบคุณ?", ans: "🥰" },
                { icon: "👮", title: "ตำรวจใจดี", story: "คุณตำรวจคอยดูแลความสงบเรียบร้อย หากเราหลงทางสามารถเดินไปขอความช่วยเหลือได้", q: "ข้อไหนคือคุณตำรวจ?", ans: "👮" },
                { icon: "🏫", title: "รักษาสมบัติส่วนรวม", story: "ของเล่นในห้องเรียนหรือหนังสือในห้องสมุดเป็นของทุกคน เราต้องเล่นและใช้ดูแลอย่างดี", q: "ข้อไหนคือโรงเรียน?", ans: "🏫" }
            ]
        }
    ];

    let currentWeek = 1;
    let score = 0;
    let listenedStatus = {}; 
    
    // อัปเดตไอคอนตัวหลอกให้ตรงกับหมวดหมู่เชิงนามธรรมและวิทยาศาสตร์
    const dummyIcons = [
        "🧸", "🍎", "🚗", "🍦", "🐱", "🐶", "🌳", "🚁", "🚲", "🍭", 
        "⚽", "🪁", "🌈", "🦋", "🍄", "🍉", "🎈", "🦆", "🍓", "🧁",
        "⚙️", "💡", "🔭", "🌍", "🎸", "🎵", "⛄", "🌧️", "🔥", "🚑",
        "🪐", "🔍", "💊", "🧲", "🧭", "🛡️", "🪨", "🏺", "💻", "🎙️"
    ];

    function initNav() {
        const nav = document.getElementById('weekNav');
        nav.innerHTML = '';
        weekData.forEach(w => {
            const btn = document.createElement('button');
            btn.className = `page-btn ${w.week === currentWeek ? 'active' : ''}`;
            btn.innerText = `สัปดาห์ ${w.week}`;
            btn.onclick = () => changeWeek(w.week);
            nav.appendChild(btn);
        });
    }

    function renderLessons() {
        const grid = document.getElementById('lessonGrid');
        const weekLabel = document.getElementById('weekLabel');
        grid.innerHTML = '';
        const weekGroup = weekData.find(w => w.week === currentWeek);
        if(!weekGroup) return;

        weekLabel.innerText = `สัปดาห์ที่ ${currentWeek}: ${weekGroup.theme}`;

        weekGroup.items.forEach((item, idx) => {
            const itemKey = `w${currentWeek}i${idx}`;
            const isDone = listenedStatus[itemKey] === true;
            
            const card = document.createElement('div');
            card.className = 'lesson-card';
            card.innerHTML = `
                <span class="icon-box">${item.icon}</span>
                <h3>${item.title}</h3>
                <div class="btn-container">
                    <button class="btn-audio" onclick="speakStory('${itemKey}', '${item.story}')">
                        <span>🔊</span> ฟังเรื่องราว
                    </button>
                    <button id="testBtn-${itemKey}" 
                            class="btn-play ${isDone ? '' : 'locked'}" 
                            onclick="tryOpenQuiz('${itemKey}', ${currentWeek}, ${idx})">
                        <span>📝</span> ทดสอบ
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function changeWeek(weekNum) {
        currentWeek = weekNum;
        initNav();
        renderLessons();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function speak(text, onEnd) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'th-TH';
        msg.pitch = 1.1;
        msg.rate = 1.0;
        if (onEnd) {
            msg.onend = onEnd;
        }
        window.speechSynthesis.speak(msg);
    }

    function speakStory(key, text) {
        speak(text, () => {
            listenedStatus[key] = true;
            const btn = document.getElementById(`testBtn-${key}`);
            if (btn) btn.classList.remove('locked');
        });
    }

    function tryOpenQuiz(key, weekNum, index) {
        if (listenedStatus[key]) {
            openQuiz(weekNum, index);
        } else {
            showToast();
            speak("กรุณากดฟังเรื่องราวก่อนนะจ๊ะ");
        }
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2500);
    }

    function openQuiz(weekNum, index) {
        const weekItem = weekData.find(w => w.week === weekNum);
        const item = weekItem.items[index];
        
        document.getElementById('quizTitle').innerText = item.q;
        const optionsDiv = document.getElementById('quizOptions');
        optionsDiv.innerHTML = '';

        let options = [{ icon: item.icon, isCorrect: true, title: item.title }];
        let availableDummies = dummyIcons.filter(d => d !== item.icon);
        
        while (options.length < 3) {
            let randIdx = Math.floor(Math.random() * availableDummies.length);
            options.push({ icon: availableDummies[randIdx], isCorrect: false });
            availableDummies.splice(randIdx, 1);
        }
        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const b = document.createElement('div');
            b.className = 'quiz-option';
            b.innerHTML = `<span class="opt-icon">${opt.icon}</span>`;
            b.onclick = () => {
                if (opt.isCorrect) {
                    speak(`${opt.title} ถูกต้องแล้วจ้า เก่งมากเลย`);
                    b.style.backgroundColor = "#c8e6c9";
                    b.style.borderColor = "#4caf50";
                    updateScore(10); // เพิ่มคะแนนครั้งละ 10
                    setTimeout(closeQuiz, 1500);
                } else {
                    speak(`ยังไม่ใช่นะ ลองหาภาพ ${item.title} ใหม่นะ`);
                    b.style.backgroundColor = "#ffcdd2";
                    b.style.borderColor = "#f44336";
                }
            };
            optionsDiv.appendChild(b);
        });

        document.getElementById('quizModal').style.display = 'flex';
        speak(item.q);
    }

    function updateScore(points) {
        score += points;
        document.getElementById('currentScore').innerText = score;
        const wrapper = document.getElementById('scoreWrapper');
        wrapper.style.transform = 'scale(1.2)';
        setTimeout(() => {
            wrapper.style.transform = 'scale(1)';
        }, 300);
    }

    function closeQuiz() {
        document.getElementById('quizModal').style.display = 'none';
        window.speechSynthesis.cancel();
    }

    window.onload = () => {
        initNav();
        renderLessons();
    };
</script>
</body>
</html>
